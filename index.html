<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Financiero</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

.row {
    display: flex;
    gap: 10px;
}

.result {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    background: #020617;
    font-weight: bold;
}

.ahorro { color: #22c55e; }
.deuda { color: #ef4444; }
.vida { color: #facc15; }

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}
</style>
</head>

<body>

<div class="container">
    <h2>💸 Control</h2>

    <input type="number" id="ingreso" placeholder="¿Cuánto te entró?">

    <div class="row">
        <input type="number" id="pAhorro" value="20">
        <input type="number" id="pDeuda" value="42">
    </div>

    <button onclick="calcular()">Calcular</button>

    <div class="result ahorro" id="ahorro"></div>
    <div class="result deuda" id="deuda"></div>
    <div class="result vida" id="vida"></div>
</div>

<script>
function formatoCOP(num) {
    return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0
    }).format(num);
}

function calcular() {
    let ingreso = parseFloat(document.getElementById("ingreso").value) || 0;
    let pAhorro = parseFloat(document.getElementById("pAhorro").value) || 0;
    let pDeuda = parseFloat(document.getElementById("pDeuda").value) || 0;

    let ahorro = ingreso * (pAhorro / 100);
    let deuda = ingreso * (pDeuda / 100);
    let vida = ingreso - ahorro - deuda;

    document.getElementById("ahorro").innerText = "Ahorro: " + formatoCOP(ahorro);
    document.getElementById("deuda").innerText = "Deudas: " + formatoCOP(deuda);
    document.getElementById("vida").innerText = "Vida: " + formatoCOP(vida);
}

// service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
